name: "Compute Daily Version"
description: "Generates YYYY-MM-DD.NN version based on last workflow run of a repo"

inputs:
  repo:
    description: "Repository to inspect (owner/repo)"
    required: true
  token:
    description: "GitHub token"
    required: true

outputs:
  version:
    description: "Computed version string"

runs:
  using: "composite"
  steps:
    - name: Get last version
      id: last
      shell: bash
      run: |
        RESPONSE=$(curl -s \
          -H "Authorization: Bearer ${{ inputs.token }}" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/${{ inputs.repo }}/actions/runs?event=repository_dispatch&per_page=1")

        LAST_VERSION=$(echo "$RESPONSE" | jq -r '.workflow_runs[0].display_title' | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}\.[0-9]{2}' || echo "")
        echo "last=$LAST_VERSION" >> $GITHUB_OUTPUT

    - name: Compute next version
      id: compute
      shell: bash
      run: |
        TODAY=$(date +'%Y-%m-%d')
        LAST="${{ steps.last.outputs.last }}"

        if [[ "$LAST" == "$TODAY"* ]]; then
          COUNT=$(echo $LAST | awk -F. '{print $2}')
          COUNT=$((COUNT+1))
        else
          COUNT=1
        fi

        VERSION="$TODAY.$(printf "%02d" $COUNT)"
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Set output
      shell: bash
      run: echo "version=${{ steps.compute.outputs.version }}" >> $GITHUB_OUTPUT
